<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel - Açougue</title>

<style>
  * { box-sizing: border-box; }
  body {
    margin:0;
    background:#000 url("bg.jpg") center/cover no-repeat fixed;
    font-family: Arial, Helvetica, sans-serif;
    overflow:hidden;
    color:#fff;
  }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); }
  .wrap { position:relative; height:100vh; width:100vw; padding:24px; display:flex; flex-direction:column; gap:18px; }

  header {
    display:flex; align-items:center; gap:18px;
    padding:14px 18px;
    background:rgba(0,0,0,.55);
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
  }
  header img { height:56px; width:auto; object-fit:contain; }
  header .title { display:flex; flex-direction:column; gap:2px; }
  header h1 { margin:0; font-size:28px; letter-spacing:.3px; }
  header .sub { opacity:.9; font-size:14px; }

  .stage {
    position:relative;
    flex:1;
    border-radius:18px;
    overflow:hidden;
    background:rgba(0,0,0,.40);
    box-shadow:0 10px 30px rgba(0,0,0,.30);
  }

  /* Slides */
  .slide {
    position:absolute;
    inset:0;
    padding:26px 30px;
    opacity:0;
    transform: translateX(18px);
    transition: opacity 700ms ease, transform 700ms ease;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .slide.active { opacity:1; transform: translateX(0); }

  .grid {
    display:grid;
    grid-template-columns: 1fr 220px;
    gap:12px;
    align-items:start;
    width:100%;
  }
  .row {
    display:contents;
  }
  .name {
    padding:10px 12px;
    background:rgba(255,255,255,.06);
    border-radius:12px;
    font-size:24px;
    line-height:1.15;
  }
  .price {
    padding:10px 12px;
    background:rgba(255,255,255,.10);
    border-radius:12px;
    font-size:26px;
    font-weight:700;
    text-align:right;
    white-space:nowrap;
  }

  /* Rodapé discreto */
  .foot {
    position:absolute;
    right:14px;
    bottom:10px;
    font-size:12px;
    opacity:.75;
  }

  /* Tela pequena */
  @media (max-width: 900px) {
    header img { height:42px; }
    header h1 { font-size:20px; }
    .name { font-size:18px; }
    .price { font-size:20px; }
    .grid { grid-template-columns: 1fr 140px; }
  }
</style>
</head>

<body>
  <div class="overlay"></div>
  <div class="wrap">
    <header>
      <img src="logo.png" alt="Logo">
      <div class="title">
        <h1 id="nomeEmpresa">Tabela de Preços</h1>
        <div class="sub" id="status">Carregando…</div>
      </div>
    </header>

    <div class="stage" id="stage">
      <div class="foot" id="ultimaAtualizacao"></div>
    </div>
  </div>

<script>
  // ============================
  // CONFIGURAÇÕES
  // ============================
  const NOME_EMPRESA = "Açougue";
  const TEMPO_SLIDE_MS = 10_000;   // tempo de cada slide
  const REFETCH_MS    = 60_000;    // busca novos preços a cada 60s
  const VERSION_MS    = 30_000;    // checa se o site mudou (layout/código) a cada 30s

  // ============================
  // ESTADO
  // ============================
  const stage = document.getElementById("stage");
  const statusEl = document.getElementById("status");
  const nomeEl = document.getElementById("nomeEmpresa");
  const updEl = document.getElementById("ultimaAtualizacao");

  nomeEl.textContent = NOME_EMPRESA;

  let slidesData = [];
  let slideIndex = 0;
  let slideTimer = null;

  let currentVersion = null; // lido de version.txt
  let lastHash = null;       // hash do produtos.json (pra evitar redesenho desnecessário)

  // ============================
  // HELPERS
  // ============================
  function hashJson(obj) {
    try { return JSON.stringify(obj); } catch (e) { return String(Date.now()); }
  }

  function fmtNow() {
    const d = new Date();
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${dd}/${mm}/${yy} ${hh}:${mi}`;
  }

  function clearSlides() {
    stage.querySelectorAll(".slide").forEach(el => el.remove());
  }

  function buildSlides(slides) {
    clearSlides();
    if (!Array.isArray(slides) || !slides.length) {
      statusEl.textContent = "Sem itens para exibir";
      return;
    }

    slides.forEach((items, i) => {
      const slide = document.createElement("div");
      slide.className = "slide" + (i === 0 ? " active" : "");

      const grid = document.createElement("div");
      grid.className = "grid";

      (items || []).forEach(p => {
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = (p && p.nome) ? p.nome : "";

        const price = document.createElement("div");
        price.className = "price";
        price.textContent = (p && p.preco) ? p.preco : "";

        grid.appendChild(name);
        grid.appendChild(price);
      });

      slide.appendChild(grid);
      stage.appendChild(slide);
    });

    // reinicia rotação
    slideIndex = 0;
    startRotation();
  }

  function showSlide(i) {
    const els = stage.querySelectorAll(".slide");
    if (!els.length) return;
    els.forEach(s => s.classList.remove("active"));
    els[i].classList.add("active");
  }

  function nextSlide() {
    const els = stage.querySelectorAll(".slide");
    if (!els.length) return;
    slideIndex = (slideIndex + 1) % els.length;
    showSlide(slideIndex);
  }

  function startRotation() {
    if (slideTimer) clearInterval(slideTimer);
    const els = stage.querySelectorAll(".slide");
    if (!els.length) return;
    showSlide(0);
    slideTimer = setInterval(nextSlide, TEMPO_SLIDE_MS);
  }

  async function fetchNoCache(url) {
    const u = url + (url.includes("?") ? "&" : "?") + "v=" + Date.now();
    const res = await fetch(u, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} ao buscar ${url}`);
    return res;
  }

  // ============================
  // ATUALIZA PREÇOS (produtos.json)
  // ============================
  async function atualizarProdutos() {
    try {
      statusEl.textContent = "Atualizando preços…";
      const res = await fetchNoCache("produtos.json");
      const json = await res.json();

      const h = hashJson(json);
      if (h !== lastHash) {
        lastHash = h;
        slidesData = json;
        buildSlides(slidesData);
        updEl.textContent = "Atualizado em " + fmtNow();
      }

      statusEl.textContent = "Online";
    } catch (e) {
      statusEl.textContent = "Offline (mantendo último preço)";
      // mantém o que já está na tela
      console.warn(e);
    }
  }

  // ============================
  // ATUALIZA SITE (version.txt)
  // - se mudar, recarrega a página (pega novo index.html/css)
  // ============================
  async function checarVersao() {
    try {
      const res = await fetchNoCache("version.txt");
      const txt = (await res.text()).trim();

      if (!currentVersion) {
        currentVersion = txt || "0";
        return;
      }
      if (txt && txt !== currentVersion) {
        // mudou a "versão" do site -> recarrega
        location.reload(true);
      }
    } catch (e) {
      // se falhar, não faz nada
      console.warn(e);
    }
  }

  // Inicialização
  (async function init() {
    await checarVersao();
    await atualizarProdutos();

    setInterval(atualizarProdutos, REFETCH_MS);
    setInterval(checarVersao, VERSION_MS);
  })();
</script>
</body>
</html>
