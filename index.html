<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel Açougue</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      background: #000;
      background-image: url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Camada escura para contraste */
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.55));
      pointer-events: none;
      z-index: 0;
    }

    #slides-root { position: relative; z-index: 1; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateX(18px);
      transition: opacity 700ms ease, transform 700ms ease;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 30% 70%;
      gap: 0;
    }

    /* ======= ESQUERDA (OFERTA) ======= */
    .left { padding: 22px; }

    .wood-plaque {
      background: linear-gradient(180deg, #1a1a1a, #ff0000);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      color: #fff;
      font-weight: 900;
      letter-spacing: 1px;
      font-size: 80px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.45);
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .promo-card {
      height: calc(100% - 92px);
      border-radius: 18px;
      background: radial-gradient(circle at 30% 20%, #fff3a3, #ffd400 60%, #f0b400);
      border: 3px solid rgba(255,255,255,0.40);
      box-shadow: 0 18px 28px rgba(0,0,0,0.55);
      padding: 18px 18px 16px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .promo-card::before{
      content:"";
      position:absolute;
      inset:-40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), transparent 55%);
      transform: rotate(-12deg);
      pointer-events:none;
    }

    .promo-title {
font-family: 'Anton', sans-serif;
  font-size: 100px;
  font-weight: 400;
  color: #b10000;
  text-align: center;
  text-transform: uppercase;
  line-height: 1.05;
  letter-spacing: 1px;
  text-shadow: 4px 4px 0px #fff;
    }

    .promo-image {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 auto;
      width: 100%;
    }

    .promo-image img {
      width: 86%;
      max-height: 540px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow:
        0 14px 22px rgba(0,0,0,0.28),
        0 0 0 6px rgba(255,255,255,0.06);
    }

    .promo-price {
	font-family: 'Anton', sans-serif;
      position: relative;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow: 0 14px 22px rgba(0,0,0,0.22);
    }

    .promo-price::before{
      content:"";
      position:absolute;
      inset: 2px 2px auto 2px;
      height: 45%;
      border-radius: 16px 16px 26px 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
      pointer-events:none;
    }

    .promo-price .rs {
      font-size: 54px;
      font-weight: 900;
      color: #b10000;
      text-shadow: 0 10px 18px rgba(0,0,0,0.22);
      -webkit-text-stroke: 1px rgba(255,255,255,0.45);
    }

    .promo-price .big {
      font-size: 180px;
      font-weight: 900;
      color: #b10000;
      letter-spacing: 1px;
      
    }

    .promo-price .unit {
      font-size: 30px;
      font-weight: 900;
      color: #222;
    }

    /* ======= DIREITA (TABELAS) ======= */
    .right { padding: 18px 22px 22px 22px; }

    .top-banner {
      width: 100%;
      height: 160px;
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: 18px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }
    .top-banner img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Wrapper geral das listas */
    .tables-wrapper {
      height: calc(100% - 178px);
      display: flex;
      flex-direction: column;
    }

    /* Título único da categoria */
    .category-title {
      text-align: center;
      font-size: 40px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding: 10px 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.25));
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 20px rgba(0,0,0,0.35);
    }

    /* Duas colunas */
    .tables {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .table-box {
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 14px 24px rgba(0,0,0,0.45);
      background: rgba(0,0,0,0.18);
      display:flex;
      flex-direction: column;
    }

    .table-body {
      padding: 10px 12px;
      display:flex;
      flex-direction: column;
      gap: 6px;
    }

    .row {
      display:flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .row-name {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      max-width: 72%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .row-price {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      white-space: nowrap;
      text-shadow: 0 6px 14px rgba(0,0,0,0.55);
      -webkit-text-stroke: 1px rgba(255,255,255,0.55);
    }
  </style>
</head>

<body>
  <div id="slides-root"></div>

  <script>
    // =========================
    // CONFIG
    // =========================
    const TEMPO_SLIDE_MS = 10000;
    const REFETCH_MS     = 60000;
    const VERSION_MS     = 30000;
    const PROMOS_MS      = 60000;

    const TEXTO_PROMO = "OFERTA DO DIA";
    const ITENS_POR_COLUNA = 20;

    const PROMOS_URL = "promocoes.json";
    let PROMOS = [];

    // Cache do último produtos.json para re-render quando promoções mudarem
    let lastProdutos = [];
    let lastHash = "";

    // =========================
    // Utils
    // =========================
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));

    function slugify(text) {
      return String(text ?? "")
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-+)|(-+$)/g, "");
    }

    function ofertaImgSrc(promoNome) {
      const slug = slugify(promoNome);
      if (!slug) return "ofertas/padrao.png";
      return `ofertas/${slug}.png`;
    }

    function categoria(nome) {
      const n = String(nome ?? "")
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toUpperCase();

      const processados = [
        "LINGUICA","SALSI","SALSICHA","MORTADELA","PRESUNTO","APRESUNTADO",
        "BLANQUET","SALAME","COPA","LOMBO DEFUM","BACON","PAIO","CALABRESA",
        "FRANKFURT","HAMBUR","NUGGET","EMPANAD","ALMONDEGA","KIBE","KAFTA",
        "DEFUM","FATIADO","RECHEADO"
      ];

      const aves = [
        "FRANGO","GALINHA","COXA DE","SOBRECOXA","ASA","SASSAMI","PEITO DE FRANGO",
        "FILE DE FRANGO","PERU","CHESTER","PATO","MOELA","CORACAO","COXINHA",
        "FIGADO DE FRANGO","PESCOCO","PE DE FRANGO","CARCACA"
      ];

      const suinos = [
        "SUIN","PORCO","PERNIL","LOMBO","BISTECA","COSTELINHA","COSTELA SU",
        "PANCETA","TOUCINHO","TORRESMO","ORELHA","RABO SU","JOELHO","PE SU"
      ];

      if (processados.some(k => n.includes(k))) return "PROCESSADOS";
      if (aves.some(k => n.includes(k))) return "AVES";
      if (suinos.some(k => n.includes(k))) return "SUÍNOS";
      return "BOVINOS";
    }

    function normalizarDados(data) {
      if (!Array.isArray(data)) return [];
      if (data.length && Array.isArray(data[0])) return data.flat();
      return data;
    }

    function renderLinhas(lista) {
      return (lista || []).map(p => {
        const nome = esc((p?.nome ?? "").toUpperCase());
        const preco = esc(p?.preco ?? "");
        return `
          <div class="row">
            <div class="row-name">${nome}</div>
            <div class="row-price">${preco}</div>
          </div>
        `;
      }).join("");
    }

    function simpleHash(obj) {
      try { return JSON.stringify(obj); }
      catch { return String(Date.now()); }
    }

    // =========================
    // Promoções
    // =========================
    async function carregarPromocoes() {
      const resp = await fetch(`${PROMOS_URL}?v=${Date.now()}`, { cache: "no-store" });
      if (!resp.ok) throw new Error(`Falha ao carregar ${PROMOS_URL}: ${resp.status}`);
      const data = await resp.json();
      PROMOS = Array.isArray(data) ? data : [];

      // Força re-render com os últimos produtos, mesmo que o hash não mude
      if (Array.isArray(lastProdutos) && lastProdutos.length) {
        renderSlides(lastProdutos);
        startSlideshow();
      }
    }

    // =========================
    // Render
    // =========================
    function renderSlides(produtos) {
      const root = document.getElementById("slides-root");
      if (!root) return;

      const itens = Array.isArray(produtos) ? produtos : [];

      const grupos = { "BOVINOS": [], "SUÍNOS": [], "AVES": [], "PROCESSADOS": [] };
      for (const p of itens) {
        const cat = categoria(p?.nome);
        (grupos[cat] ||= []).push(p);
      }

      const ordem = ["BOVINOS", "SUÍNOS", "AVES", "PROCESSADOS"];
      const porSlide = ITENS_POR_COLUNA * 2;

      const slidesData = [];
      for (const cat of ordem) {
        const lista = grupos[cat] || [];
        for (let i = 0; i < lista.length; i += porSlide) {
          const page = lista.slice(i, i + porSlide);
          slidesData.push({
            cat,
            colEsq: page.slice(0, ITENS_POR_COLUNA),
            colDir: page.slice(ITENS_POR_COLUNA)
          });
        }
      }

      if (!slidesData.length) {
        slidesData.push({ cat: "BOVINOS", colEsq: [], colDir: [] });
      }

      let html = "";

      slidesData.forEach((s, idx) => {
        const active = idx === 0 ? " active" : "";
        const titulo = esc(s.cat);

        const promo = (Array.isArray(PROMOS) && PROMOS.length)
          ? PROMOS[idx % PROMOS.length]
          : { nome: "OFERTA", preco: "R$ --,--", unidade: "KG", imagem: "padrao.png" };

        const promoNome = String(promo?.nome ?? "");
        const promoNomeEsc = esc(promoNome);

        const promoImg = promo?.imagem
          ? `ofertas/${String(promo.imagem)}`
          : (promoNome ? ofertaImgSrc(promoNome) : "ofertas/padrao.png");

        const promoPrecoTxt = String(promo?.preco ?? "")
          .replace(/^\s*R\$\s*/i, "")
          .trim();
        const precoBig = esc(promoPrecoTxt || "--,--");

        const promoUnidade = String(promo?.unidade ?? "KG").toUpperCase();

        html += `
<section class="slide${active}">
  <div class="screen">

    <aside class="left">
      <div class="wood-plaque">${esc(TEXTO_PROMO)}</div>

      <div class="promo-card">
        <div class="promo-title">${promoNomeEsc}</div>

        <div class="promo-image">
          <img
            src="${esc(promoImg)}"
            alt=""
            onerror="this.onerror=null; this.src='ofertas/padrao.png';"
          >
        </div>

        <div class="promo-price">
          <span class="rs">R$</span>
          <span class="big">${precoBig}</span>
          <span class="unit">/${esc(promoUnidade)}</span>
        </div>
      </div>
    </aside>

    <main class="right">
      <div class="top-banner">
        <img id="banner-img" src="banner.jpg" alt="Banner" onerror="this.style.display='none'">
      </div>

      <div class="tables-wrapper">
        <div class="category-title">${titulo}</div>

        <div class="tables">
          <section class="table-box">
            <div class="table-body">
              ${renderLinhas(s.colEsq)}
            </div>
          </section>

          <section class="table-box">
            <div class="table-body">
              ${renderLinhas(s.colDir)}
            </div>
          </section>
        </div>
      </div>
    </main>

  </div>
</section>
        `;
      });

      root.innerHTML = html;
    }

    // =========================
    // Slideshow
    // =========================
    let slideIdx = 0;
    let slideTimer = null;

    function startSlideshow() {
      if (slideTimer) clearInterval(slideTimer);
      slideIdx = 0;

      const slides = Array.from(document.querySelectorAll(".slide"));
      const show = (i) => {
        slides.forEach(s => s.classList.remove("active"));
        if (slides[i]) slides[i].classList.add("active");
      };

      if (slides.length) show(0);

      slideTimer = setInterval(() => {
        if (!slides.length) return;
        slideIdx = (slideIdx + 1) % slides.length;
        show(slideIdx);
      }, TEMPO_SLIDE_MS);
    }

    // =========================
    // Produtos
    // =========================
    async function carregarProdutos(forceRender = false) {
      const url = `produtos.json?v=${Date.now()}`;
      const resp = await fetch(url, { cache: "no-store" });
      if (!resp.ok) throw new Error(`Falha ao carregar ${url}: ${resp.status}`);

      const data = await resp.json();
      const produtos = normalizarDados(data);
      lastProdutos = produtos;

      const h = simpleHash(produtos);

      if (forceRender || h !== lastHash) {
        lastHash = h;
        renderSlides(produtos);
        startSlideshow();
      }
    }

    // =========================
    // Banner cache-busting via version.txt
    // =========================
    function aplicarVersaoNoBanner(v) {
      const img = document.getElementById("banner-img");
      if (!img) return;
      img.src = `banner.jpg?v=${encodeURIComponent(v || Date.now())}`;
    }

    let lastVersion = null;

    async function checarVersao() {
      const url = `version.txt?v=${Date.now()}`;
      const resp = await fetch(url, { cache: "no-store" });
      if (!resp.ok) return;

      const v = (await resp.text()).trim();
      aplicarVersaoNoBanner(v);

      if (lastVersion === null) { lastVersion = v; return; }
      if (v && v !== lastVersion) location.reload();
    }

    // =========================
    // Boot (uma vez só, sem duplicar intervals)
    // =========================
    async function boot() {
      try { await carregarPromocoes(); } catch (e) { console.warn("Promocoes:", e); }
      try { await carregarProdutos(true); } catch (e) { console.warn("Produtos:", e); }
      try { await checarVersao(); } catch {}
    }

    boot();

    setInterval(() => carregarProdutos(false).catch(console.warn), REFETCH_MS);
    setInterval(() => carregarPromocoes().catch(console.warn), PROMOS_MS);
    setInterval(() => checarVersao().catch(() => {}), VERSION_MS);
  </script>
</body>
</html>
